<!doctype html>
<head>
    <title>Northern Ireland Demon List</title>
    <link rel="icon" href="images/NIDL.png" type="image/x-icon">
    <meta property="og:title" content="Demon list NI" />
    <meta property="og:image" content="images/NIreland.svg"/>
    <meta property="og:type" content="website" />
    <meta
        property="og:description"
        content="Hardest completions in Northern Ireland"
    />

    <script src="NIDL.js" defer></script>
    <link rel="stylesheet" href="style.css"></link>
</head>
<body>



<div class="NIDLheader">
    <img src="images/NIDLnew.png">
    <div class="options" style="display: flex; gap: 40px;">
        <div style="display: flex; gap: 10px;">
            <button class="btnToggle" id="modern" style="background-color: rgb(100, 100, 100); color: rgb(0, 0, 0);">List</button>
            <button class="btnToggle" id="grid" style="background-color: rgb(0, 0, 0); color: rgb(34, 34, 34);">Grid</button>
        </div>
        <div style="display: flex; gap: 10px;">
            <button class="btnToggleType" id="classics" style="background-color: rgb(100, 100, 100); color: rgb(0, 0, 0);">Classics</button>
            <button class="btnToggleType" id="platformers" style="background-color: rgb(0, 0, 0); color: rgb(34, 34, 34);" hidden>Platformers</button>
        </div>
        <div style="display: flex; gap: 10px;">
            <button id="profiles">To List</button>
            <textarea id="targetPlayerInput" placeholder="Search player" style="background-color: #000;"></textarea>
        </div>
    </div>
</div>


<div class="biggroup">
        <div id="list" class="list">
            
        </div>
    
    <div class="right" style="text-align: right; font-size: 18px; max-width: 320px;">
        <p style="text-align: right;">Completions sorted by AREDL<br><br>@azymyt on Discord for<br>questions/records/inquiries</p>
        <p>Site is still under development</p>
        <p>platforms are broken, some dates/first victors are not currently sorted correctly</p>
        <a href="https://docs.google.com/spreadsheets/d/1kgSNtY1q_RscXJGZe-XOM5NSUfpV1UkYnmLthz8fFlI/edit?usp=sharing" target="_blank">Sheet version</a>
        <div class="playerscontainer" style="text-align: right;">
            <p>PLAYERS:</p>
            <p id="players"></p>
        </div>
    </div>

</body>
